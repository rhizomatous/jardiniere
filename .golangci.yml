version: "2"

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - nakedret
    - nilerr
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - whitespace

  exclusions:
    generated: lax
    rules:
      # some test helpers legitimately have unused params
      - path: _test\.go
        linters:
          - unparam
      # test funcs (TestXxx) don't need exported-style doc comments
      - path: _test\.go
        linters:
          - revive

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/vivshaw/jardiniere
