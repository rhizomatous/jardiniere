# goreleaser config — https://goreleaser.com
# build & publish jard for macOS and Linux on tag push.
# test locally without publishing: `make release-check`.
version: 2

project_name: jardiniere

before:
  hooks:
    - go mod tidy

builds:
  - id: jard
    binary: jard
    main: ./cmd/jard
    env:
      - CGO_ENABLED=0
    # inject the version into the same symbol the Makefile uses.
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: jard
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE.md

checksum:
  name_template: checksums.txt

changelog:
  # build release notes from the git log, grouped by conventional-commit type.
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^docs'
      - '^test'
      - '^ci'
      - '^Merge '

release:
  # 0.x / pre-release tags (e.g. v0.1.0-rc1) are flagged automatically.
  prerelease: auto
  draft: false
