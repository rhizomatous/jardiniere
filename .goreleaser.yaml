# goreleaser config — https://goreleaser.com
# build & publish jard for macOS and Linux on tag push.
# test locally without publishing: `make release-check`.
version: 2

project_name: jardiniere

before:
  hooks:
    - go mod tidy

builds:
  - id: jard
    binary: jard
    main: ./cmd/jard
    env:
      - CGO_ENABLED=0
    # inject the version into the same symbol the Makefile uses.
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: jard
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE.md

checksum:
  name_template: checksums.txt

changelog:
  # build release notes from the git log, grouped by conventional-commit type.
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^docs'
      - '^test'
      - '^ci'
      - '^Merge '

release:
  # 0.x / pre-release tags (e.g. v0.1.0-rc1) are flagged automatically.
  prerelease: auto
  draft: false

homebrew_casks:
  - name: jard
    # publish only when a tap token is configured; otherwise skip so a
    # release never fails for a missing secret.
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'
    homepage: https://github.com/rhizomatous/jardiniere
    description: a Nix-based sandbox for running coding agents in isolated containers
    # the binary is unsigned/unnotarized; strip the quarantine flag so macOS
    # doesn't refuse to run it after a brew install.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/jard"]
          end
    repository:
      owner: rhizomatous
      name: homebrew-tap
      branch: main
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
