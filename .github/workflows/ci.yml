name: CI

# fork-safety:
#   - use `pull_request`, so runs from forks get a read-only token and no
#     access to secrets.
#   - use least privilege for granted perms.
#   - (in GH settings) fork PRs are held for maintainer approval before any 
#     code runs.
#   - (in GH settings) require actions to be pinned to a commit SHA
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Run checks
        run: nix develop --command make check
